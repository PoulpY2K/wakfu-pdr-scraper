name: Docker Publish and Deploy

on:
  workflow_run:
    workflows: [ "Maven Build and Analyze" ]
    types: [ completed ]
    branches-ignore: [ 'main' ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    # Only run on successful push builds (not pull_request)
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' }}
    permissions:
      contents: read
      packages: write
      id-token: write
      actions: read
    outputs:
      has-latest: ${{ steps.check-latest.outputs.has-latest }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Lowercase image name
        env:
          REPO: ${{ github.repository }}
        run: echo "IMAGE_NAME_LOWER=${REPO,,}" >> $GITHUB_ENV

      - name: Download JAR artifact
        uses: actions/download-artifact@v8
        with:
          name: blackflash-jar
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sanitize ref name for Docker tag
        id: ref
        env:
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          sanitized=$(echo "$HEAD_BRANCH" | sed 's/[/ ]/-/g')
          echo "sanitized=$sanitized" >> $GITHUB_OUTPUT

      - name: Install cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003
        with:
          cosign-release: 'v3.0.5'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},value=${{ github.event.workflow_run.head_branch }}
            type=semver,pattern={{major}}.{{minor}},value=${{ github.event.workflow_run.head_branch }}
            type=raw,value=${{ steps.ref.outputs.sanitized }}
            type=sha,format=short,value=${{ github.event.workflow_run.head_sha }}

      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}:build-cache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}:build-cache,mode=max

      - name: Sign the published Docker image
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.build-and-push.outputs.digest }}
        run: echo "${TAGS}" | xargs -I {} cosign sign --yes {}@${DIGEST}

      - name: Check if latest tag was generated
        id: check-latest
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          if echo "$TAGS" | grep -q ":latest$"; then
            echo "has-latest=true" >> $GITHUB_OUTPUT
          else
            echo "has-latest=false" >> $GITHUB_OUTPUT
          fi

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: needs.build.outputs.has-latest == 'true'
    steps:
      - name: Execute remote SSH commands using SSH key
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            ${{ secrets.SSH_SCRIPT }}